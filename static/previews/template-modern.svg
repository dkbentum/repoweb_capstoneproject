<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320" role="img" aria-labelledby="title desc">
  <title id="title">Modern Split Preview</title>
  <desc id="desc">Vertical sidebar with compact report section</desc>
  <rect width="520" height="320" fill="#f1faf8"/>
  <rect x="0" y="0" width="150" height="320" fill="#0D7A5F"/>
  <text x="20" y="34" fill="#ffffff" font-family="Arial, sans-serif" font-size="19" font-weight="700">Modern</text>
  <text x="20" y="53" fill="#d6fff1" font-family="Arial, sans-serif" font-size="12">Split Layout</text>

  <rect x="18" y="86" width="114" height="76" rx="8" fill="#1f9073"/>
  <rect x="18" y="174" width="114" height="60" rx="8" fill="#2ca384"/>
  <text x="28" y="108" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Student</text>
  <text x="28" y="124" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">Overall Pos</text>

  <text x="170" y="38" fill="#123128" font-family="Arial, sans-serif" font-size="22" font-weight="700">Report Card</text>
