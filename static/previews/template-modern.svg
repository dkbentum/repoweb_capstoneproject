  <rect x="170" y="92" width="332" height="194" rx="10" fill="#ffffff" stroke="#b8e2d6"/>
  <rect x="170" y="92" width="332" height="24" rx="10" fill="#157a61"/>

  <g fill="#ecf8f4" stroke="#d8ece5">
    <rect x="170" y="116" width="332" height="30"/>
    <rect x="170" y="146" width="332" height="30" fill="#f8fcfb"/>
    <rect x="170" y="176" width="332" height="30"/>
    <rect x="170" y="206" width="332" height="30" fill="#f8fcfb"/>
    <rect x="170" y="236" width="332" height="30"/>
